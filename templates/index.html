<!doctype html>
<html>
  <head>
    <title>Upload Excel</title>
  </head>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
    }
  </style>
  <body>
    <h1>Upload File Excel</h1>

    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" />
      <button type="submit">Upload</button>
    </form>

    <hr />

    {% if data %}
    <h2>Hasil Data:</h2>
    {{ data|safe }} {% endif %}
  </body>
</html>
